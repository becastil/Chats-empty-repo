name: Release CLI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: repo-scout-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Require a main-branch release commit
        run: git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Install hash-locked build tools
        run: >-
          python -m pip install --require-hashes
          -r .github/release-requirements.txt

      - name: Build portable zipapp
        run: python scripts/build_zipapp.py --dist dist

      - name: Build wheel and source distribution
        run: python -m build --no-isolation --sdist --wheel --outdir dist

      - name: Validate version and write checksums
        run: >-
          python scripts/prepare_release.py
          --tag "$GITHUB_REF_NAME" --dist dist

      - name: Smoke test the built wheel
        run: |
          python -m venv "$RUNNER_TEMP/repo-scout-release"
          "$RUNNER_TEMP/repo-scout-release/bin/python" -m pip install --no-deps dist/*.whl
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-distribution" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-growth" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-outreach" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-policy" list --format json
          python scripts/smoke_test_policy_activation.py \
            --python "$RUNNER_TEMP/repo-scout-release/bin/python"
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-pilot" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-rollout" --help

      - name: Smoke test the portable zipapp
        run: |
          version="${GITHUB_REF_NAME#v}"
          python "dist/repo-scout-${version}.pyz" --help
          python "dist/repo-scout-${version}.pyz" --format json . > "$RUNNER_TEMP/zipapp-snapshot.json"

      - name: Attest release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/repo_scout-*.whl dist/repo_scout-*.tar.gz
          dist/repo-scout-*.pyz dist/SHA256SUMS
          --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
          --title "Repo Scout $GITHUB_REF_NAME"
