name: Release CLI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: repo-scout-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Require an annotated release tag
        run: |
          tag_ref="refs/tags/${GITHUB_REF_NAME}"
          tag_type="$(git cat-file -t "$tag_ref")"
          if [[ "$tag_type" != "tag" ]]; then
            printf 'Release ref %s must be an annotated tag; found %s.\n' \
              "$tag_ref" "$tag_type" >&2
            exit 1
          fi
          peeled_commit="$(git rev-parse "${tag_ref}^{commit}")"
          if [[ "$peeled_commit" != "$GITHUB_SHA" ]]; then
            printf 'Release tag %s peels to %s instead of push commit %s.\n' \
              "$tag_ref" "$peeled_commit" "$GITHUB_SHA" >&2
            exit 1
          fi

      - name: Require a main-branch release commit
        run: git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Verify hash-locked build tools
        run: |
          build_venv="$RUNNER_TEMP/repo-scout-release-build"
          python -m venv "$build_venv"
          "$build_venv/bin/python" -m pip install \
            --disable-pip-version-check \
            --require-hashes \
            --force-reinstall \
            -r .github/release-requirements.txt
          "$build_venv/bin/python" -m pip check

      - name: Build portable zipapp
        run: >-
          "$RUNNER_TEMP/repo-scout-release-build/bin/python"
          scripts/build_zipapp.py --dist dist

      - name: Build wheel and source distribution
        run: >-
          "$RUNNER_TEMP/repo-scout-release-build/bin/python" -m build
          --no-isolation --sdist --wheel --outdir dist

      - name: Validate version and write checksums
        run: >-
          "$RUNNER_TEMP/repo-scout-release-build/bin/python"
          scripts/prepare_release.py
          --tag "$GITHUB_REF_NAME" --dist dist

      - name: Verify source distribution rebuild
        run: |
          version="${GITHUB_REF_NAME#v}"
          rebuilt_wheels="$RUNNER_TEMP/repo-scout-release-sdist-wheels"
          "$RUNNER_TEMP/repo-scout-release-build/bin/python" -m pip wheel \
            --disable-pip-version-check \
            --no-cache-dir \
            --no-index \
            --no-deps \
            --no-build-isolation \
            --wheel-dir "$rebuilt_wheels" \
            "dist/repo_scout-${version}.tar.gz"
          "$RUNNER_TEMP/repo-scout-release-build/bin/python" \
            scripts/compare_wheel_contents.py \
            "dist/repo_scout-${version}-py3-none-any.whl" \
            "$rebuilt_wheels/repo_scout-${version}-py3-none-any.whl"

      - name: Smoke test the built wheel
        run: |
          version="${GITHUB_REF_NAME#v}"
          python -m venv "$RUNNER_TEMP/repo-scout-release"
          "$RUNNER_TEMP/repo-scout-release/bin/python" -m pip install \
            --disable-pip-version-check \
            --no-index \
            --no-deps \
            "dist/repo_scout-${version}-py3-none-any.whl"
          for command in \
            repo-scout \
            repo-scout-distribution \
            repo-scout-growth \
            repo-scout-outreach \
            repo-scout-pilot \
            repo-scout-policy \
            repo-scout-rollout; do
            actual="$("$RUNNER_TEMP/repo-scout-release/bin/$command" --version)"
            test "$actual" = "$command $version"
          done
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-distribution" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-growth" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-outreach" --help
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-policy" list --format json
          python scripts/smoke_test_policy_activation.py \
            --python "$RUNNER_TEMP/repo-scout-release/bin/python" \
            --command-directory "$RUNNER_TEMP/repo-scout-release/bin"
          python scripts/smoke_test_outreach_lifecycle.py \
            --python "$RUNNER_TEMP/repo-scout-release/bin/python" \
            --command-directory "$RUNNER_TEMP/repo-scout-release/bin"
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-pilot" --help
          python scripts/smoke_test_pilot_funnel.py \
            --python "$RUNNER_TEMP/repo-scout-release/bin/python" \
            --command-directory "$RUNNER_TEMP/repo-scout-release/bin"
          "$RUNNER_TEMP/repo-scout-release/bin/repo-scout-rollout" --help
          python scripts/smoke_test_rollout_summary.py \
            --python "$RUNNER_TEMP/repo-scout-release/bin/python" \
            --command-directory "$RUNNER_TEMP/repo-scout-release/bin"

      - name: Smoke test the portable zipapp
        run: |
          version="${GITHUB_REF_NAME#v}"
          test "$(python "dist/repo-scout-${version}.pyz" --version)" = "repo-scout $version"
          python "dist/repo-scout-${version}.pyz" --help
          python "dist/repo-scout-${version}.pyz" --format json . > "$RUNNER_TEMP/zipapp-snapshot.json"

      - name: Revalidate release checksums
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum --check SHA256SUMS
          else
            shasum -a 256 -c SHA256SUMS
          fi

      - name: Attest release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Publish and verify immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            dist/repo_scout-*.whl dist/repo_scout-*.tar.gz \
            dist/repo-scout-*.pyz dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes \
            --title "Repo Scout $GITHUB_REF_NAME"
          immutable="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
              --jq '.immutable'
          )"
          if [[ "$immutable" != "true" ]]; then
            printf 'Published release %s is not immutable.\n' \
              "$GITHUB_REF_NAME" >&2
            exit 1
          fi
