name: Site dependency contract

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - .github/dependabot.yml
      - ".github/workflows/**"
      - tests/dependency-compatibility.test.mjs
      - tests/test_dependabot_contract.py
      - tests/test_site_dependency_workflow.py
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/dependabot.yml
      - ".github/workflows/**"
      - tests/dependency-compatibility.test.mjs
      - tests/test_dependabot_contract.py
      - tests/test_site_dependency_workflow.py
  schedule:
    - cron: "23 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-scout-site-dependencies-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.13.0"
          package-manager-cache: false

      - name: Validate repository contracts
        run: python3 -m unittest discover -s tests

      - name: Install locked dependencies
        run: npm ci

      - name: Require a clean dependency audit
        run: npm run audit:dependencies

      - name: Build and test dependency compatibility
        run: npm test

      - name: Lint the site
        run: npm run lint
