name: Release tooling contract

on:
  pull_request:
    paths:
      - ".github/release-requirements.txt"
      - ".github/workflows/release-tooling.yml"
      - ".github/workflows/release.yml"
      - "LICENSE"
      - "README.md"
      - "pyproject.toml"
      - "scripts/build_zipapp.py"
      - "scripts/compare_wheel_contents.py"
      - "scripts/prepare_release.py"
      - "scripts/smoke_test_outreach_lifecycle.py"
      - "scripts/smoke_test_pilot_funnel.py"
      - "scripts/smoke_test_policy_activation.py"
      - "scripts/smoke_test_rollout_summary.py"
      - "src/**"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - ".github/release-requirements.txt"
      - ".github/workflows/release-tooling.yml"
      - ".github/workflows/release.yml"
      - "LICENSE"
      - "README.md"
      - "pyproject.toml"
      - "scripts/build_zipapp.py"
      - "scripts/compare_wheel_contents.py"
      - "scripts/prepare_release.py"
      - "scripts/smoke_test_outreach_lifecycle.py"
      - "scripts/smoke_test_pilot_funnel.py"
      - "scripts/smoke_test_policy_activation.py"
      - "scripts/smoke_test_rollout_summary.py"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-scout-release-tooling-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out candidate source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up release Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Test release contracts
        run: >-
          python -m unittest
          tests.test_release
          tests.test_release_tooling_workflow

      - name: Verify hash-locked release tools
        run: |
          release_venv="$RUNNER_TEMP/repo-scout-release-venv"
          python -m venv "$release_venv"
          "$release_venv/bin/python" -m pip install \
            --disable-pip-version-check \
            --require-hashes \
            --force-reinstall \
            -r .github/release-requirements.txt
          "$release_venv/bin/python" -m pip check

      - name: Build candidate artifacts
        run: |
          dist="$RUNNER_TEMP/repo-scout-release-dist"
          release_python="$RUNNER_TEMP/repo-scout-release-venv/bin/python"
          "$release_python" scripts/build_zipapp.py --dist "$dist"
          "$release_python" -m build --no-isolation --sdist --wheel --outdir "$dist"
          version="$(
            "$release_python" -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])'
          )"
          "$release_python" scripts/prepare_release.py --tag "v${version}" --dist "$dist"

      - name: Verify source distribution rebuild
        run: |
          dist="$RUNNER_TEMP/repo-scout-release-dist"
          release_python="$RUNNER_TEMP/repo-scout-release-venv/bin/python"
          rebuilt_wheels="$RUNNER_TEMP/repo-scout-sdist-wheels"
          version="$(
            "$release_python" -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])'
          )"
          "$release_python" -m pip wheel \
            --disable-pip-version-check \
            --no-cache-dir \
            --no-index \
            --no-deps \
            --no-build-isolation \
            --wheel-dir "$rebuilt_wheels" \
            "$dist/repo_scout-${version}.tar.gz"
          "$release_python" scripts/compare_wheel_contents.py \
            "$dist/repo_scout-${version}-py3-none-any.whl" \
            "$rebuilt_wheels/repo_scout-${version}-py3-none-any.whl"

      - name: Smoke test candidate artifacts
        run: |
          dist="$RUNNER_TEMP/repo-scout-release-dist"
          release_python="$RUNNER_TEMP/repo-scout-release-venv/bin/python"
          smoke_venv="$RUNNER_TEMP/repo-scout-release-smoke"
          version="$(
            "$release_python" -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])'
          )"
          python -m venv "$smoke_venv"
          "$smoke_venv/bin/python" -m pip install \
            --disable-pip-version-check \
            --no-index \
            --no-deps \
            "$dist/repo_scout-${version}-py3-none-any.whl"
          for command in \
            repo-scout \
            repo-scout-distribution \
            repo-scout-growth \
            repo-scout-outreach \
            repo-scout-pilot \
            repo-scout-policy \
            repo-scout-rollout; do
            actual="$("$smoke_venv/bin/$command" --version)"
            test "$actual" = "$command $version"
          done
          "$smoke_venv/bin/repo-scout" --help
          "$smoke_venv/bin/repo-scout-distribution" --help
          "$smoke_venv/bin/repo-scout-growth" --help
          "$smoke_venv/bin/repo-scout-outreach" --help
          "$smoke_venv/bin/repo-scout-policy" list --format json
          python scripts/smoke_test_policy_activation.py \
            --python "$smoke_venv/bin/python" \
            --command-directory "$smoke_venv/bin"
          python scripts/smoke_test_outreach_lifecycle.py \
            --python "$smoke_venv/bin/python" \
            --command-directory "$smoke_venv/bin"
          "$smoke_venv/bin/repo-scout-pilot" --help
          python scripts/smoke_test_pilot_funnel.py \
            --python "$smoke_venv/bin/python" \
            --command-directory "$smoke_venv/bin"
          "$smoke_venv/bin/repo-scout-rollout" --help
          python scripts/smoke_test_rollout_summary.py \
            --python "$smoke_venv/bin/python" \
            --command-directory "$smoke_venv/bin"
          test "$(python "$dist/repo-scout-${version}.pyz" --version)" = "repo-scout $version"
          python "$dist/repo-scout-${version}.pyz" --help
          python "$dist/repo-scout-${version}.pyz" --format json . > "$RUNNER_TEMP/repo-scout-candidate-snapshot.json"
