name: Repo Scout policy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  attestations: read

env:
  REPO_SCOUT_REPOSITORY: becastil/Chats-empty-repo
  REPO_SCOUT_REPOSITORY_ID: ${{ github.repository }}
  REPO_SCOUT_VERSION: "0.3.51"
  REPO_SCOUT_SOURCE_SHA: e38c54c1564a65427ed6616eda180e5dadf40414
  REPO_SCOUT_WHEEL_SHA256: 506925aaba1acec2e4e4f6332753f1a140a0ec3d3ed133e15489613883e425b5

concurrency:
  group: repo-scout-policy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Download pinned Repo Scout release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_dir="$RUNNER_TEMP/repo-scout-release"
          wheel_name="repo_scout-${REPO_SCOUT_VERSION}-py3-none-any.whl"
          mkdir -p "$release_dir"
          for attempt in 1 2 3 4; do
            attempt_dir="$release_dir/attempt-$attempt"
            mkdir -p "$attempt_dir"
            if gh release download "v${REPO_SCOUT_VERSION}" \
              --repo "$REPO_SCOUT_REPOSITORY" \
              --dir "$attempt_dir" \
              --pattern "$wheel_name" \
              --pattern SHA256SUMS \
              && [[ -f "$attempt_dir/$wheel_name" ]] \
              && [[ -f "$attempt_dir/SHA256SUMS" ]] \
              && mv "$attempt_dir/$wheel_name" "$attempt_dir/SHA256SUMS" \
                "$release_dir/"; then
              break
            fi
            if [[ "$attempt" -eq 4 ]]; then
              printf 'Repo Scout release download failed after %s attempts.\n' "$attempt" >&2
              exit 1
            fi
            sleep "$((attempt * 5))"
          done

      - name: Verify release integrity and provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_dir="$RUNNER_TEMP/repo-scout-release"
          wheel_name="repo_scout-${REPO_SCOUT_VERSION}-py3-none-any.whl"
          wheel="$release_dir/$wheel_name"
          manifest="$release_dir/SHA256SUMS"
          manifest_matches="$(
            awk -v expected="$REPO_SCOUT_WHEEL_SHA256  $wheel_name" '
              $0 == expected { matches += 1 }
              END { print matches + 0 }
            ' "$manifest"
          )"
          if [[ "$manifest_matches" != "1" ]]; then
            printf 'Repo Scout release manifest must contain exactly one pinned wheel entry.\n' >&2
            exit 1
          fi
          printf '%s  %s\n' "$REPO_SCOUT_WHEEL_SHA256" "$wheel" \
            | sha256sum --check --strict -
          pushd "$release_dir"
          sha256sum --check --ignore-missing --strict SHA256SUMS
          popd
          for attempt in 1 2 3 4; do
            if gh attestation verify "$wheel" \
              --repo "$REPO_SCOUT_REPOSITORY" \
              --signer-workflow "$REPO_SCOUT_REPOSITORY/.github/workflows/release.yml" \
              --source-ref "refs/tags/v${REPO_SCOUT_VERSION}" \
              --source-digest "$REPO_SCOUT_SOURCE_SHA" \
              --deny-self-hosted-runners; then
              break
            fi
            if [[ "$attempt" -eq 4 ]]; then
              printf 'Repo Scout provenance verification failed after %s attempts.\n' "$attempt" >&2
              exit 1
            fi
            sleep "$((attempt * 5))"
          done

      - name: Install verified Repo Scout release
        run: |
          wheel="$RUNNER_TEMP/repo-scout-release/repo_scout-${REPO_SCOUT_VERSION}-py3-none-any.whl"
          python -m venv "$RUNNER_TEMP/repo-scout-venv"
          "$RUNNER_TEMP/repo-scout-venv/bin/python" -m pip install \
            --disable-pip-version-check --no-index --no-deps "$wheel"

      - name: Enforce policy and generate rollout evidence
        run: >-
          "$RUNNER_TEMP/repo-scout-venv/bin/repo-scout" --format markdown
          --policy examples/team-policy.toml
          --rollout-checklist
          --repository-id "$REPO_SCOUT_REPOSITORY_ID"
          --output "$RUNNER_TEMP/repo-scout-rollout.md" --force .

      - name: Add rollout evidence to job summary
        if: ${{ always() }}
        run: |
          if [[ -f "$RUNNER_TEMP/repo-scout-rollout.md" ]]; then
            cat "$RUNNER_TEMP/repo-scout-rollout.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload rollout evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repo-scout-rollout-evidence
          path: ${{ runner.temp }}/repo-scout-rollout.md
          if-no-files-found: warn
          retention-days: 14
