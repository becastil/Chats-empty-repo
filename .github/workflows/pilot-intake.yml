name: Pilot intake contract

on:
  pull_request:
    paths:
      - ".github/ISSUE_TEMPLATE/founding-team-pilot.yml"
      - ".github/workflows/pilot-intake.yml"
      - "scripts/audit_pilot_labels.py"
      - "src/repo_scout/pilot_funnel.py"
      - "tests/test_pilot_label_audit.py"
  push:
    branches: [main]
    paths:
      - ".github/ISSUE_TEMPLATE/founding-team-pilot.yml"
      - ".github/workflows/pilot-intake.yml"
      - "scripts/audit_pilot_labels.py"
      - "src/repo_scout/pilot_funnel.py"
      - "tests/test_pilot_label_audit.py"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Test the intake-label contract
        run: python -m unittest tests.test_pilot_label_audit

      - name: Audit live pilot labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/audit_pilot_labels.py --repo "$GITHUB_REPOSITORY"
