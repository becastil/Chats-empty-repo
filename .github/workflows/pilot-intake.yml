name: Pilot intake contract

on:
  pull_request:
    paths:
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/founding-team-pilot.yml"
      - ".github/workflows/pilot-intake.yml"
      - "BUSINESS_MODEL.md"
      - "DISTRIBUTION.md"
      - "docs/github-actions.md"
      - "docs/pilot-rollout.md"
      - "docs/pilot-tracking.md"
      - "examples/pilot-delivery-record.md"
      - "pyproject.toml"
      - "scripts/audit_pilot_labels.py"
      - "src/repo_scout/pilot_funnel.py"
      - "tests/test_pilot_delivery_contract.py"
      - "tests/test_pilot_intake_workflow.py"
      - "tests/test_pilot_label_audit.py"
  push:
    branches: [main]
    paths:
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/founding-team-pilot.yml"
      - ".github/workflows/pilot-intake.yml"
      - "BUSINESS_MODEL.md"
      - "DISTRIBUTION.md"
      - "docs/github-actions.md"
      - "docs/pilot-rollout.md"
      - "docs/pilot-tracking.md"
      - "examples/pilot-delivery-record.md"
      - "pyproject.toml"
      - "scripts/audit_pilot_labels.py"
      - "src/repo_scout/pilot_funnel.py"
      - "tests/test_pilot_delivery_contract.py"
      - "tests/test_pilot_intake_workflow.py"
      - "tests/test_pilot_label_audit.py"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Test the pilot intake and delivery contracts
        run: >-
          python -m unittest
          tests.test_pilot_intake_workflow
          tests.test_pilot_label_audit
          tests.test_pilot_delivery_contract

      - name: Audit live pilot labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/audit_pilot_labels.py --repo "$GITHUB_REPOSITORY"
