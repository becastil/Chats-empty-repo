version = 4

[repository]
required_files = [
  "README.md",
  "PROJECT_STATE.md",
  "ROADMAP.md",
  "CHANGELOG.md",
  "DECISIONS.md",
]
required_file_groups = [
  ["package-lock.json", "pnpm-lock.yaml", "yarn.lock"],
]
forbidden_files = [".env", ".env.local"]
forbidden_file_patterns = ["**/.env", "**/.env.local"]
max_files = 5000
max_total_bytes = 50000000
require_clean_git = true
