version = 3

[repository]
required_files = [
  "README.md",
  "PROJECT_STATE.md",
  "ROADMAP.md",
  "CHANGELOG.md",
  "DECISIONS.md",
]
forbidden_files = [".env", ".env.local"]
forbidden_file_patterns = ["**/.env", "**/.env.local"]
max_files = 5000
max_total_bytes = 50000000
require_clean_git = true
